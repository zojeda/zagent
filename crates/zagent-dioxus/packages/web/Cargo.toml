[package]
name = "web"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["web"] }
api = { workspace = true }
ui = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
js-sys = "0.3"
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["Window", "Document", "Element", "HtmlElement", "Location", "Storage", "EventSource", "MessageEvent", "Event"] }

[features]
default = []
web = ["dioxus/web"]
server = ["dioxus/server", "ui/server"]
