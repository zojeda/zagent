[package]
name = "web"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["web"] }
api = { workspace = true }
ui = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
js-sys = "0.3"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Window", "Document", "Element", "EventTarget", "HtmlElement", "HtmlInputElement", "HtmlTextAreaElement", "Location", "Storage", "EventSource", "MessageEvent", "Event", "ClipboardEvent", "DataTransfer", "DataTransferItem", "DataTransferItemList", "Navigator", "Clipboard", "Url", "Blob", "File", "FileList", "MediaDevices", "MediaStream", "MediaStreamTrack", "MediaStreamConstraints", "AudioContext", "AudioDestinationNode", "MediaStreamAudioSourceNode", "ScriptProcessorNode", "AudioBuffer", "AudioProcessingEvent"] }

[features]
default = []
web = ["dioxus/web"]
server = ["dioxus/server", "ui/server"]
