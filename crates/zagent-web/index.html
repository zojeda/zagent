<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/firacode/6.2.0/fira_code.min.css" />
    <link data-trunk rel="rust" />
    <title>zAgent Web</title>
    <style>
      :root {
        --bg-0: #0b1220;
        --bg-1: #111b2f;
        --frame: #1f2b45;
        --glow: #2f4368;
        --text: #e5edf8;
      }
      body {
        margin: 0;
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background:
          radial-gradient(circle at 15% 10%, #1d2f55 0%, transparent 45%),
          radial-gradient(circle at 85% 85%, #134660 0%, transparent 40%),
          linear-gradient(165deg, var(--bg-0) 0%, var(--bg-1) 100%);
        color: var(--text);
        overflow: hidden;
      }
      pre {
        font-family: "Fira Code", monospace;
        font-size: 14px;
        margin: 0;
        text-shadow: 0 0 1px rgba(0, 0, 0, 0.4);
      }
      body > * {
        border: 1px solid var(--frame);
        box-shadow:
          0 0 0 1px #0a1325 inset,
          0 12px 40px rgba(0, 0, 0, 0.4),
          0 0 30px rgba(47, 67, 104, 0.25);
        border-radius: 10px;
        overflow: hidden;
      }
    </style>
    <script>
      window.zagentClipboard = {
        async readText() {
          return await navigator.clipboard.readText();
        },
        async writeText(text) {
          await navigator.clipboard.writeText(text);
          return true;
        },
      };
    </script>
  </head>
  <body></body>
</html>
